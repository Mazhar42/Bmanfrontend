<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="card">
      <rect x="4" y="2" width="56" height="60" rx="9"/>
    </clipPath>
  </defs>

  <!-- Outer dark background -->
  <rect width="64" height="64" rx="10" fill="#1a1a1a"/>

  <!-- Red card -->
  <rect x="4" y="2" width="56" height="60" rx="9" fill="#c8181a"/>

  <!-- Sunburst rays clipped to card -->
  <g clip-path="url(#card)" opacity="0.25" stroke="#ff9999" stroke-width="1.2">
    <line x1="32" y1="32" x2="32" y2="2"/>
    <line x1="32" y1="32" x2="60" y2="32"/>
    <line x1="32" y1="32" x2="32" y2="62"/>
    <line x1="32" y1="32" x2="4"  y2="32"/>
    <line x1="32" y1="32" x2="54" y2="8"/>
    <line x1="32" y1="32" x2="54" y2="56"/>
    <line x1="32" y1="32" x2="10" y2="56"/>
    <line x1="32" y1="32" x2="10" y2="8"/>
    <line x1="32" y1="32" x2="43" y2="3"/>
    <line x1="32" y1="32" x2="59" y2="20"/>
    <line x1="32" y1="32" x2="59" y2="44"/>
    <line x1="32" y1="32" x2="43" y2="61"/>
    <line x1="32" y1="32" x2="21" y2="61"/>
    <line x1="32" y1="32" x2="5"  y2="44"/>
    <line x1="32" y1="32" x2="5"  y2="20"/>
    <line x1="32" y1="32" x2="21" y2="3"/>
  </g>

  <!-- Drop shadow B -->
  <text x="34" y="51"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="900"
    fill="#6b0000" opacity="0.55">B</text>

  <!-- Main Gothic B -->
  <text x="31" y="49"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52" font-weight="900"
    fill="#111111">B</text>
</svg>
